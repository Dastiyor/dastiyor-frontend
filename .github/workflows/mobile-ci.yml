name: Mobile CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/mobile/**'
      - 'packages/types/**'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/types/**'
      - 'pnpm-lock.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version is read from the root package.json "packageManager" field
      # (pnpm@10.29.3). Do not pin it here — action-setup@v4 errors if both are set.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dastiyor/mobile exec tsc --noEmit
      - run: pnpm --filter @dastiyor/mobile lint
      - run: pnpm --filter @dastiyor/mobile test
